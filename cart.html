<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="cart-container">
        <h1 class="cart-title">Shopping Cart</h1>
        <div class="cart-items-container" id="cart-items">
            <div class="cart-item">
                <img src="https://placehold.co/400x300?text=Premium+Leather+Bag" alt="">
                <div class="cart-item-details">
                    <h3 class="cart-item-title">Premium Leather Bag</h3>
                    <p class="cart-item-price">$129.99</p>
                    <div class="cart-item-actions">
                        <input type="number" value="1" min="1" class="quantity-input">
                        <button class="remove-button">Remove</button>
                    </div>
                </div>
            </div>

            <div class="cart-item">
                <img src="https://placehold.co/400x300?text=Premium+Leather+Bag" alt="">
                <div class="cart-item-details">
                    <h3 class="cart-item-title">Premium Leather Bag</h3>
                    <p class="cart-item-price">$129.99</p>
                    <div class="cart-item-actions">
                        <input type="number" value="1" min="1" class="quantity-input">
                        <button class="remove-button">Remove</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="cart-summary">
            <p id="cart-total">Total: $0.00</p>
            <button class="cart-checkout-button" id="checkout-button">Checkout</button>
        </div>
    </div>
    <script>
    </script>
</body>

</html>
